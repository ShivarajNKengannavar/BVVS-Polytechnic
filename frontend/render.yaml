services:
  - type: web
    name: frontend
    env: static
    staticPublishPath: dist/bvvs-frontend/browser
    buildCommand: npm install && npm run build
    startCommand: null
    routes:
      - type: rewrite
        source: /admin/dashboard
        destination: /index.html
      - type: rewrite
        source: /admin/*
        destination: /index.html
      - type: rewrite
        source: /admin/*/*
        destination: /index.html
      - type: rewrite
        source: /*
        destination: /index.html
      - type: rewrite
        source: /*/*
        destination: /index.html